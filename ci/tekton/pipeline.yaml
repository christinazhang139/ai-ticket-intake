apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: ai-ticket-intake-ci
  namespace: ai-ticket-intake
spec:
  params:
    - name: git-url
      type: string
    - name: git-revision
      type: string
      default: main
    - name: image-name
      type: string
      default: image-registry.openshift-image-registry.svc:5000/ai-ticket-intake/ai-ticket-intake
  workspaces:
    - name: source
  tasks:
    - name: clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
      workspaces:
        - name: output
          workspace: source
    - name: build-and-push
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - clone
      params:
        - name: IMAGE
          value: $(params.image-name):$(params.git-revision)
        - name: CONTEXT
          value: .
        - name: DOCKERFILE
          value: ./Dockerfile
      workspaces:
        - name: source
          workspace: source
